name: CI
on:
  - push
  - pull_request

jobs:
  test:
    strategy:
      matrix:
        include:
          - shell: /bin/busybox ash
            awk: /bin/busybox awk
          - shell: /bin/dash
          - shell: /bin/bash
          - shell: /bin/zsh
          - awk: /usr/bin/gawk
          - awk: /usr/bin/mawk
          - awk: /usr/bin/nawk
          - os: macos-latest
            shell: /bin/sh
          - os: macos-latest
            shell: /bin/bash
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    env:
      ESH_SHELL: ${{ matrix.shell }}
      ESH_AWK: ${{ matrix.awk }}
    steps:
      - uses: actions/checkout@v2

      - run: sudo apt-get install zsh
        if: runner.os == 'Linux' && matrix.shell == '/bin/zsh'

      - run: make test
